<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1320" role="img" aria-label="AI Team 功能架构图">
<defs>
<style>
.title{font:700 28px 'JetBrains Mono', monospace; fill:#e2e8f0}
.sub{font:500 13px 'JetBrains Mono', monospace; fill:#94a3b8}
.h{font:700 16px 'JetBrains Mono', monospace; fill:#e2e8f0}
.t{font:500 11px 'JetBrains Mono', monospace; fill:#cbd5e1}
.l{font:600 10px 'JetBrains Mono', monospace; fill:#94a3b8}
.s{font:600 11px 'JetBrains Mono', monospace; fill:#7dd3fc}
</style>

</defs>
<rect width="1600" height="1320" fill="#020617" />
<text x="60" y="52" class="title" fill="#e2e8f0">AI Team 功能架构图</text>
<text x="60" y="78" class="sub" fill="#94a3b8">图类型：系统功能架构图（概要设计）。回答平台建设目标、功能分层、核心闭环与继承的底层全局能力，不下沉到底层实现细节。</text>

<rect x="50" y="108" width="1500" height="1160" rx="18" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="8 6" />
<text x="72" y="134" class="s" fill="#7dd3fc">AI Team 功能边界</text>


<rect x="90" y="166" width="1420" height="136" rx="16" fill="rgba(59,130,246,0.08)" stroke="#38bdf8" stroke-dasharray="5 5" />
<text x="116" y="194" class="h" fill="#e2e8f0">接入与工作台层</text>
<text x="116" y="214" class="l" fill="#94a3b8">用户进入平台并选择合适交互面：前台工作台、协作页、自主任务页、后台控制台。</text>
<rect x="130" y="230" width="250" height="50" rx="12" fill="#0f172a" stroke="#38bdf8" />
<text x="255" y="260" text-anchor="middle" class="t" fill="#cbd5e1">身份与空间入口</text>
<rect x="410" y="230" width="240" height="50" rx="12" fill="#0f172a" stroke="#38bdf8" />
<text x="530" y="260" text-anchor="middle" class="t" fill="#cbd5e1">单任务工作台</text>
<rect x="680" y="230" width="260" height="50" rx="12" fill="#0f172a" stroke="#38bdf8" />
<text x="810" y="260" text-anchor="middle" class="t" fill="#cbd5e1">多角色协作工作台</text>
<rect x="970" y="230" width="220" height="50" rx="12" fill="#0f172a" stroke="#38bdf8" />
<text x="1080" y="260" text-anchor="middle" class="t" fill="#cbd5e1">自主任务入口</text>
<rect x="1220" y="230" width="220" height="50" rx="12" fill="#0f172a" stroke="#38bdf8" />
<text x="1330" y="260" text-anchor="middle" class="t" fill="#cbd5e1">治理控制台</text>


<rect x="90" y="332" width="1420" height="186" rx="16" fill="rgba(16,185,129,0.08)" stroke="#34d399" stroke-dasharray="5 5" />
<text x="116" y="360" class="h" fill="#e2e8f0">Team Panel 业务控制层</text>
<text x="116" y="380" class="l" fill="#94a3b8">平台核心控制面：负责业务对象、实例化配置、业务任务翻译、结果包装与治理经营。</text>
<rect x="130" y="400" width="250" height="78" rx="12" fill="#0f172a" stroke="#34d399" />
<text x="255" y="430" text-anchor="middle" class="t" fill="#cbd5e1">身份与空间管理</text>
<text x="255" y="452" text-anchor="middle" class="l" fill="#94a3b8">企业 / 个人空间、成员、角色、租户隔离</text>
<rect x="410" y="400" width="250" height="78" rx="12" fill="#0f172a" stroke="#34d399" />
<text x="535" y="430" text-anchor="middle" class="t" fill="#cbd5e1">数字员工管理</text>
<text x="535" y="452" text-anchor="middle" class="l" fill="#94a3b8">员工定义、岗位、启停、实例化</text>
<rect x="690" y="400" width="250" height="78" rx="12" fill="#0f172a" stroke="#34d399" />
<text x="815" y="430" text-anchor="middle" class="t" fill="#cbd5e1">模板与行业方案管理</text>
<text x="815" y="452" text-anchor="middle" class="l" fill="#94a3b8">人才市场、团队模板、行业方案、一键应用</text>
<rect x="970" y="400" width="250" height="78" rx="12" fill="#0f172a" stroke="#34d399" />
<text x="1095" y="430" text-anchor="middle" class="t" fill="#cbd5e1">能力绑定管理</text>
<text x="1095" y="447" text-anchor="middle" class="l" fill="#94a3b8"><tspan x="1095" dy="0">模型 / Prompt / 知识 / Skill</tspan><tspan x="1095" dy="12">连接器 / Memory 策略</tspan></text>
<rect x="1250" y="400" width="220" height="78" rx="12" fill="#0f172a" stroke="#34d399" />
<text x="1360" y="430" text-anchor="middle" class="t" fill="#cbd5e1">治理与经营</text>
<text x="1360" y="452" text-anchor="middle" class="l" fill="#94a3b8">权限、审计、成本、运营统计</text>


<rect x="90" y="548" width="1420" height="244" rx="16" fill="rgba(34,197,94,0.09)" stroke="#22c55e" stroke-dasharray="5 5" />
<text x="116" y="576" class="h" fill="#e2e8f0">协作与执行控制层（核心功能闭环）</text>
<text x="116" y="596" class="l" fill="#94a3b8">核心闭环：招募员工 -&gt; 配置能力 -&gt; Team Panel 生成运行请求 -&gt; Gateway 接入 Runtime -&gt; 结果回流。</text>
<rect x="150" y="648" width="220" height="90" rx="12" fill="#0f172a" stroke="#22c55e" />
<text x="260" y="680" text-anchor="middle" class="t" fill="#cbd5e1">任务识别与路由</text>
<text x="260" y="704" text-anchor="middle" class="l" fill="#94a3b8">区分单任务 / 多角色 / 长周期 / 多模态任务</text>
<rect x="430" y="626" width="320" height="132" rx="14" fill="#0f172a" stroke="#22c55e" />
<text x="590" y="660" text-anchor="middle" class="h" fill="#e2e8f0">多智能体协作编排</text>
<text x="590" y="686" text-anchor="middle" class="t" fill="#cbd5e1">业务协作语义、任务拆解、责任分配、主持汇总</text>
<text x="590" y="712" text-anchor="middle" class="l" fill="#94a3b8">是 AI Team 最核心的差异化功能主轴</text>
<rect x="810" y="648" width="240" height="90" rx="12" fill="#0f172a" stroke="#22c55e" />
<text x="930" y="680" text-anchor="middle" class="t" fill="#cbd5e1">任务树与进度回流</text>
<text x="930" y="704" text-anchor="middle" class="l" fill="#94a3b8">协同气泡、进度卡、结果摘要、状态回流</text>
<rect x="1110" y="648" width="240" height="90" rx="12" fill="#0f172a" stroke="#22c55e" />
<text x="1230" y="680" text-anchor="middle" class="t" fill="#cbd5e1">定时 / Loop 管理</text>
<text x="1230" y="704" text-anchor="middle" class="l" fill="#94a3b8">周期任务、PDAR、暂停 / 恢复 / 停止</text>


<rect x="90" y="822" width="1420" height="250" rx="16" fill="rgba(245,158,11,0.08)" stroke="#fbbf24" stroke-dasharray="5 5" />
<text x="116" y="850" class="h" fill="#e2e8f0">底层全局能力与能力装配层</text>
<text x="116" y="870" class="l" fill="#94a3b8">AI Team 继承并产品化 Runtime 的多入口、工具、技能、记忆、插件、会话、多模态与 provider 路由能力。</text>
<rect x="130" y="894" width="220" height="66" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="240" y="922" text-anchor="middle" class="t" fill="#cbd5e1">Gateway / 多入口宿主</text>
<text x="240" y="944" text-anchor="middle" class="l" fill="#94a3b8">进程内 Gateway / CLI / Cron / ACP / Batch</text>
<rect x="380" y="894" width="220" height="66" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="490" y="922" text-anchor="middle" class="t" fill="#cbd5e1">Provider 路由与 Fallback</text>
<text x="490" y="939" text-anchor="middle" class="l" fill="#94a3b8"><tspan x="490" dy="0">OpenAI-compatible / Anthropic</tspan><tspan x="490" dy="12">Gemini / custom</tspan></text>
<rect x="630" y="894" width="220" height="66" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="740" y="922" text-anchor="middle" class="t" fill="#cbd5e1">工具系统 / MCP / Plugins</text>
<text x="740" y="939" text-anchor="middle" class="l" fill="#94a3b8"><tspan x="740" dy="0">tool registry / toolsets</tspan><tspan x="740" dy="12">协议扩展 / hooks</tspan></text>
<rect x="880" y="894" width="220" height="66" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="990" y="922" text-anchor="middle" class="t" fill="#cbd5e1">记忆 / 技能 / 上下文</text>
<text x="990" y="932" text-anchor="middle" class="l" fill="#94a3b8"><tspan x="990" dy="0">memory / skills</tspan><tspan x="990" dy="12">context assembly</tspan><tspan x="990" dy="12">session search</tspan></text>
<rect x="1130" y="894" width="220" height="66" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="1240" y="922" text-anchor="middle" class="t" fill="#cbd5e1">会话存储 / Profile 隔离</text>
<text x="1240" y="939" text-anchor="middle" class="l" fill="#94a3b8"><tspan x="1240" dy="0">session history / FTS</tspan><tspan x="1240" dy="12">lineage / 多实例隔离</tspan></text>

<rect x="200" y="986" width="250" height="60" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="325" y="1014" text-anchor="middle" class="t" fill="#cbd5e1">知识库绑定</text>
<text x="325" y="1036" text-anchor="middle" class="l" fill="#94a3b8">上传、绑定、检索增强、引用展示</text>
<rect x="500" y="986" width="250" height="60" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="625" y="1014" text-anchor="middle" class="t" fill="#cbd5e1">多模态能力</text>
<text x="625" y="1036" text-anchor="middle" class="l" fill="#94a3b8">图片理解 / 图片生成 / 语音理解 / 语音生成</text>
<rect x="800" y="986" width="250" height="60" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="925" y="1014" text-anchor="middle" class="t" fill="#cbd5e1">研发与办公技能池</text>
<text x="925" y="1031" text-anchor="middle" class="l" fill="#94a3b8"><tspan x="925" dy="0">GitHub / Docs / Slides</tspan><tspan x="925" dy="12">Web Research / Notion 等</tspan></text>
<rect x="1100" y="986" width="250" height="60" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="1225" y="1014" text-anchor="middle" class="t" fill="#cbd5e1">连接器与外部能力</text>
<text x="1225" y="1036" text-anchor="middle" class="l" fill="#94a3b8">MCP、外部 API、企业系统、外部工具</text>


<rect x="90" y="1102" width="1420" height="120" rx="16" fill="rgba(16,185,129,0.08)" stroke="#34d399" stroke-dasharray="5 5" />
<text x="116" y="1130" class="h" fill="#e2e8f0">治理与经营闭环层</text>
<text x="116" y="1150" class="l" fill="#94a3b8">执行结果、日志、成本与方案运营数据统一回流平台，形成可治理、可经营的闭环。</text>
<rect x="330" y="1160" width="930" height="40" rx="12" fill="#0f172a" stroke="#34d399" />
<text x="795" y="1186" text-anchor="middle" class="t" fill="#cbd5e1">执行日志 / 审计 / 成本归集 / 工资治理 / 模板治理 / 平台经营分析</text>

















<text x="80" y="1290" class="sub" fill="#94a3b8">核心业务闭环：招募模板员工 -&gt; 绑定知识 / 连接器 / 技能 -&gt; Team Panel 生成运行请求 -&gt; Gateway 接入 Runtime 执行 / 协作 -&gt; 人工确认关键动作 -&gt; 交付结果 -&gt; 记录日志与成本</text>
</svg>