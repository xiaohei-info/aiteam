.h{font:700 16px 'JetBrains Mono', monospace; fill:#e2e8f0}
.t{font:500 11px 'JetBrains Mono', monospace; fill:#cbd5e1}
.l{font:600 10px 'JetBrains Mono', monospace; fill:#94a3b8}
.s{font:600 11px 'JetBrains Mono', monospace; fill:#7dd3fc}
</style>
<marker id="a1" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#38bdf8" /></marker>
<marker id="a2" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#34d399" /></marker>
<marker id="a3" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#fbbf24" /></marker>
<marker id="a4" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#a78bfa" /></marker>
</defs>
<rect width="1600" height="1260" fill="#020617" />
<text x="60" y="52" class="title" fill="#e2e8f0">AI Team 系统架构图</text>
<text x="60" y="78" class="sub" fill="#94a3b8">图类型：系统架构图（概要设计）。回答前端页面、Team Panel、Agent Gateway、Agent Runtime、External Capability 的边界与协作关系，并显式体现 Runtime 全局能力底座。</text>

<rect x="40" y="108" width="1520" height="1100" rx="18" fill="none" stroke="#22d3ee" stroke-width="2" stroke-dasharray="8 6" />
<text x="62" y="134" class="s" fill="#7dd3fc">AI Team 系统边界</text>


<rect x="90" y="160" width="1420" height="130" rx="16" fill="rgba(59,130,246,0.08)" stroke="#38bdf8" stroke-dasharray="5 5" />
<text x="116" y="188" class="h" fill="#e2e8f0">前端交互页面层</text>
<text x="116" y="208" class="l" fill="#94a3b8">负责交互与展示。主产品链默认经 Team Panel 入业务，再由 Gateway 接入 Runtime。</text>
<rect x="130" y="224" width="250" height="48" rx="12" fill="#0f172a" stroke="#38bdf8" />
<text x="255" y="253" text-anchor="middle" class="t" fill="#cbd5e1">企业前台工作台</text>
<rect x="410" y="224" width="240" height="48" rx="12" fill="#0f172a" stroke="#38bdf8" />
<text x="530" y="253" text-anchor="middle" class="t" fill="#cbd5e1">私聊页 / 群聊协作页</text>
<rect x="680" y="224" width="260" height="48" rx="12" fill="#0f172a" stroke="#38bdf8" />
<text x="810" y="253" text-anchor="middle" class="t" fill="#cbd5e1">员工配置 / 方案应用页</text>
<rect x="970" y="224" width="220" height="48" rx="12" fill="#0f172a" stroke="#38bdf8" />
<text x="1080" y="253" text-anchor="middle" class="t" fill="#cbd5e1">企业后台</text>
<rect x="1220" y="224" width="220" height="48" rx="12" fill="#0f172a" stroke="#38bdf8" />
<text x="1330" y="253" text-anchor="middle" class="t" fill="#cbd5e1">系统后台</text>


<rect x="90" y="330" width="420" height="700" rx="18" fill="rgba(16,185,129,0.08)" stroke="#34d399" />
<text x="116" y="360" class="h" fill="#e2e8f0">Team Panel 核心部分</text>
<text x="116" y="382" class="l" fill="#94a3b8">自建业务控制面。负责业务对象、能力绑定、业务任务翻译、结果包装与治理经营。</text>
<rect x="120" y="410" width="360" height="70" rx="12" fill="#0f172a" stroke="#34d399" />
<text x="300" y="438" text-anchor="middle" class="t" fill="#cbd5e1">身份与空间管理</text>
<text x="300" y="460" text-anchor="middle" class="l" fill="#94a3b8">企业 / 个人空间、成员、角色、租户隔离</text>
<rect x="120" y="496" width="360" height="70" rx="12" fill="#0f172a" stroke="#34d399" />
<text x="300" y="524" text-anchor="middle" class="t" fill="#cbd5e1">数字员工与方案管理</text>
<text x="300" y="546" text-anchor="middle" class="l" fill="#94a3b8">员工定义、模板、行业方案、实例化与启停</text>
<rect x="120" y="582" width="360" height="70" rx="12" fill="#0f172a" stroke="#34d399" />
<text x="300" y="610" text-anchor="middle" class="t" fill="#cbd5e1">能力绑定管理</text>
<text x="300" y="632" text-anchor="middle" class="l" fill="#94a3b8">模型 / Prompt / 知识 / Skill / 连接器 / Memory 策略</text>
<rect x="120" y="668" width="360" height="112" rx="12" fill="#0f172a" stroke="#34d399" />
<text x="300" y="698" text-anchor="middle" class="t" fill="#cbd5e1">任务入口与请求翻译</text>
<text x="300" y="718" text-anchor="middle" class="l" fill="#94a3b8">业务任务对象</text>
<text x="300" y="738" text-anchor="middle" class="l" fill="#94a3b8">-&gt; Single-Agent / Agent Group / Kanban / Cron 请求</text>
<rect x="120" y="790" width="360" height="88" rx="12" fill="#0f172a" stroke="#34d399" />
<text x="300" y="820" text-anchor="middle" class="t" fill="#cbd5e1">运行态映射与结果包装</text>
<text x="300" y="842" text-anchor="middle" class="l" fill="#94a3b8">事件流、进度、摘要、失败原因、成本归因、前后台展示对象</text>
<rect x="120" y="894" width="360" height="88" rx="12" fill="#0f172a" stroke="#34d399" />
<text x="300" y="924" text-anchor="middle" class="t" fill="#cbd5e1">治理与经营</text>
<text x="300" y="946" text-anchor="middle" class="l" fill="#94a3b8">权限、审计、成本 / 工资、运营统计、平台治理</text>


<rect x="560" y="330" width="350" height="700" rx="18" fill="rgba(14,116,144,0.08)" stroke="#38bdf8" />
<text x="586" y="360" class="h" fill="#e2e8f0">Agent Gateway 核心部分</text>
<text x="586" y="382" class="l" fill="#94a3b8">运行时接入层。承接 Runtime 接入、消息入口、事件输出与审批/中断控制。</text>
<rect x="590" y="414" width="290" height="76" rx="12" fill="#0f172a" stroke="#38bdf8" />
<text x="735" y="442" text-anchor="middle" class="t" fill="#cbd5e1">核心接口模块</text>
<text x="735" y="459" text-anchor="middle" class="l" fill="#94a3b8"><tspan x="735" dy="0">对话 / 执行 / 状态</tspan><tspan x="735" dy="12">定时任务 / capabilities</tspan></text>
<rect x="590" y="510" width="290" height="76" rx="12" fill="#0f172a" stroke="#38bdf8" />
<text x="735" y="538" text-anchor="middle" class="t" fill="#cbd5e1">运行时接入接口模块</text>
<text x="735" y="560" text-anchor="middle" class="l" fill="#94a3b8">run / status / events / approval / stop / jobs</text>
<rect x="590" y="606" width="290" height="76" rx="12" fill="#0f172a" stroke="#38bdf8" />
<text x="735" y="634" text-anchor="middle" class="t" fill="#cbd5e1">消息与宿主接入模块</text>
<text x="735" y="656" text-anchor="middle" class="l" fill="#94a3b8">私聊 / 群聊 / CLI / ACP / Batch 等宿主接入</text>
<rect x="590" y="702" width="290" height="76" rx="12" fill="#0f172a" stroke="#38bdf8" />
<text x="735" y="730" text-anchor="middle" class="t" fill="#cbd5e1">事件输出模块</text>
<text x="735" y="752" text-anchor="middle" class="l" fill="#94a3b8">SSE / 流式进度 / 结构化状态事件 / 结果回传</text>
<rect x="590" y="798" width="290" height="104" rx="12" fill="#0f172a" stroke="#38bdf8" />
<text x="735" y="828" text-anchor="middle" class="t" fill="#cbd5e1">主宿主关系说明</text>
<text x="735" y="850" text-anchor="middle" class="l" fill="#94a3b8">主产品流默认由 Team Panel 调 Gateway</text>
<text x="735" y="872" text-anchor="middle" class="l" fill="#94a3b8">V1 推荐进程内适配层；原生 API Server 为可借鉴实现</text>


<rect x="960" y="330" width="550" height="820" rx="18" fill="rgba(245,158,11,0.08)" stroke="#fbbf24" />
<text x="986" y="360" class="h" fill="#e2e8f0">Agent Runtime 核心部分</text>
<text x="986" y="382" class="l" fill="#94a3b8">执行真相层。承接统一主循环、工具/技能/记忆/MCP、Session Storage 与多模态能力。</text>

<rect x="990" y="412" width="490" height="70" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="1235" y="440" text-anchor="middle" class="t" fill="#cbd5e1">AIAgent 主循环</text>
<text x="1235" y="456" text-anchor="middle" class="l" fill="#94a3b8" font-size="9"><tspan x="1235" dy="0">推理 / tool call / retries / fallback</tspan><tspan x="1235" dy="12">compression / memory flush / persistence</tspan></text>

<rect x="990" y="498" width="490" height="70" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="1235" y="526" text-anchor="middle" class="t" fill="#cbd5e1">Runtime Host Surfaces</text>
<text x="1235" y="542" text-anchor="middle" class="l" fill="#94a3b8" font-size="9"><tspan x="1235" dy="0">CLI / Gateway / Cron</tspan><tspan x="1235" dy="12">ACP / Batch</tspan></text>

<rect x="990" y="584" width="235" height="82" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="1107" y="614" text-anchor="middle" class="t" fill="#cbd5e1">Provider Runtime</text>
<text x="1107" y="625" text-anchor="middle" class="l" fill="#94a3b8" font-size="9"><tspan x="1107" dy="0">provider / model</tspan><tspan x="1107" dy="12">api_mode / fallback</tspan><tspan x="1107" dy="12">auxiliary</tspan></text>
<rect x="1245" y="584" width="235" height="82" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="1362" y="614" text-anchor="middle" class="t" fill="#cbd5e1">Context + Compression + Cache</text>
<text x="1362" y="624" text-anchor="middle" class="l" fill="#94a3b8"><tspan x="1362" dy="0">prompt assembly</tspan><tspan x="1362" dy="12">context compression</tspan><tspan x="1362" dy="12">prompt caching</tspan></text>

<rect x="990" y="682" width="235" height="82" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="1107" y="712" text-anchor="middle" class="t" fill="#cbd5e1">Tools + MCP + Plugins</text>
<text x="1107" y="729" text-anchor="middle" class="l" fill="#94a3b8" font-size="9"><tspan x="1107" dy="0">tool registry / toolsets</tspan><tspan x="1107" dy="12">MCP / plugin hooks</tspan></text>
<rect x="1245" y="682" width="235" height="82" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="1362" y="712" text-anchor="middle" class="t" fill="#cbd5e1">Session Storage + Profiles</text>
<text x="1362" y="729" text-anchor="middle" class="l" fill="#94a3b8" font-size="9"><tspan x="1362" dy="0">sessions / FTS / lineage</tspan><tspan x="1362" dy="12">profile-scoped isolation</tspan></text>

<rect x="990" y="780" width="150" height="84" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="1065" y="810" text-anchor="middle" class="t" fill="#cbd5e1">Single-Agent</text>
<text x="1065" y="832" text-anchor="middle" class="l" fill="#94a3b8">单员工执行</text>
<rect x="1160" y="780" width="150" height="84" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="1235" y="810" text-anchor="middle" class="t" fill="#cbd5e1">Agent Group</text>
<text x="1235" y="832" text-anchor="middle" class="l" fill="#94a3b8">多 Agent 协作</text>
<rect x="1330" y="780" width="150" height="84" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="1405" y="810" text-anchor="middle" class="t" fill="#cbd5e1">Kanban Workflow</text>
<text x="1405" y="832" text-anchor="middle" class="l" fill="#94a3b8">持久协作工作流</text>

<rect x="990" y="880" width="150" height="84" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="1065" y="910" text-anchor="middle" class="t" fill="#cbd5e1">Cron Scheduling</text>
<text x="1065" y="932" text-anchor="middle" class="l" fill="#94a3b8">周期任务与 Goal 调度</text>
<rect x="1160" y="880" width="150" height="84" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="1235" y="910" text-anchor="middle" class="t" fill="#cbd5e1">Memory + Skills</text>
<text x="1235" y="932" text-anchor="middle" class="l" fill="#94a3b8">长期记忆与技能执行</text>
<rect x="1330" y="880" width="150" height="84" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="1405" y="910" text-anchor="middle" class="t" fill="#cbd5e1">Multimodal I/O</text>
<text x="1405" y="932" text-anchor="middle" class="l" fill="#94a3b8">vision / image / STT / TTS</text>

<rect x="990" y="980" width="490" height="90" rx="12" fill="#0f172a" stroke="#fbbf24" />
<text x="1235" y="1012" text-anchor="middle" class="t" fill="#cbd5e1">Runtime 结果与事件</text>
<text x="1235" y="1030" text-anchor="middle" class="l" fill="#94a3b8" font-size="9"><tspan x="1235" dy="0">运行态事件、阶段结果、失败与恢复信号</tspan><tspan x="1235" dy="12">最终结果、usage / cost metadata</tspan></text>


<rect x="90" y="1068" width="820" height="138" rx="18" fill="rgba(168,85,247,0.08)" stroke="#a78bfa" />
<text x="116" y="1098" class="h" fill="#e2e8f0">External Capability 核心部分</text>
<text x="116" y="1118" class="l" fill="#94a3b8"><tspan x="116" dy="0">统一接入知识引擎、技能生态、AI Relay、</tspan><tspan x="116" dy="12">连接器与第三方业务系统。</tspan></text>
<rect x="140" y="1146" width="145" height="40" rx="12" fill="#0f172a" stroke="#a78bfa" />
<text x="212" y="1172" text-anchor="middle" class="t" fill="#cbd5e1">知识引擎</text>
<rect x="305" y="1146" width="145" height="40" rx="12" fill="#0f172a" stroke="#a78bfa" />
<text x="377" y="1172" text-anchor="middle" class="t" fill="#cbd5e1">Skill 生态</text>
<rect x="470" y="1146" width="145" height="40" rx="12" fill="#0f172a" stroke="#a78bfa" />
<text x="542" y="1172" text-anchor="middle" class="t" fill="#cbd5e1">AI Relay</text>
<rect x="635" y="1146" width="145" height="40" rx="12" fill="#0f172a" stroke="#a78bfa" />
<text x="707" y="1172" text-anchor="middle" class="t" fill="#cbd5e1">企业连接器</text>
<rect x="800" y="1146" width="85" height="40" rx="12" fill="#0f172a" stroke="#a78bfa" />
<text x="842" y="1172" text-anchor="middle" class="t" fill="#cbd5e1">外部系统</text>
















